<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0b101c"/>
  <g fill="#e7b84e">
    <!-- row 1: 3 wide bars -->
    <rect x="7.5"  y="10.5" width="15" height="13" rx="1.5"/>
    <rect x="24.5" y="10.5" width="15" height="13" rx="1.5"/>
    <rect x="41.5" y="10.5" width="15" height="13" rx="1.5"/>
    <!-- row 2: narrow / wide / wide / narrow -->
    <rect x="5"  y="25.5" width="9"  height="13" rx="1.5"/>
    <rect x="16" y="25.5" width="15" height="13" rx="1.5"/>
    <rect x="33" y="25.5" width="15" height="13" rx="1.5"/>
    <rect x="50" y="25.5" width="9"  height="13" rx="1.5"/>
    <!-- row 3: 3 wide bars -->
    <rect x="7.5"  y="40.5" width="15" height="13" rx="1.5"/>
    <rect x="24.5" y="40.5" width="15" height="13" rx="1.5"/>
    <rect x="41.5" y="40.5" width="15" height="13" rx="1.5"/>
  </g>
</svg>
